[General]
network = marlwsn.MarlWsnNetwork
qtenv-default-config = MARL
sim-time-limit = 101s
seed-set = 42
cmdenv-express-mode = true
cmdenv-status-frequency = 10s
record-eventlog = false
output-vector-file = results/${configname}-${runnumber}.vec
output-scalar-file = results/${configname}-${runnumber}.sca
simtime-resolution = ps
**.vector-recording = true
**.scalar-recording = true

# Common packet-level WSN model. Paper Table I gives -2 for a multi-hop action
# and -8 for the transmitter-to-sink action, with every node starting at 100%.
*.numNodes = 100
*.node[*].initialEnergy = 100
*.controller.numEpisodes = 100
*.controller.activeSourcesPerEpisode = 4
*.controller.areaWidth = 100
*.controller.areaHeight = 100
*.controller.areaDepth = 0
*.controller.communicationRange = 18
*.controller.placementMode = "jitteredGrid"
*.controller.initialEnergy = 100
*.controller.sensingEnergyCost = 0.1
*.controller.multiHopEnergyCost = 2
*.controller.sinkEnergyCost = 8
*.controller.localDecisionEnergyCost = 0.05
*.controller.packetBits = 1024
*.controller.bitRate = 250kbps
*.controller.processingDelay = 1ms
*.controller.localDecisionDelay = 1ms
*.controller.cloudDecisionDelay = 15ms
*.controller.leachSetupDelay = 40ms
*.controller.episodeLength = 1s
*.controller.sourceStagger = 10ms
*.controller.maxHops = 10
*.controller.minimumSignalIntegrity = 0.70
*.controller.maxAttenuationPerHop = 0.04
*.controller.learningRate = 0.25
*.controller.discountFactor = 0.90
*.controller.initialEpsilon = 0.30
*.controller.minimumEpsilon = 0.05
*.controller.epsilonDecay = 0.97
*.controller.fusionLambda = 0.65
*.controller.extraCandidateNeighbors = 6
*.controller.qWeight = 0.025
*.controller.hotspotWeight = 0.12
*.controller.clusterHeadFraction = 0.10

[Config MARL]
description = "Proposed local multi-agent Q-learning with MERA-MST fusion"
*.controller.routingMode = "marl"
*.controller.cloudMode = false

[Config CloudMARL]
description = "Cloud-assisted MARL; global decision latency is included"
extends = MARL
*.controller.cloudMode = true

[Config SPMH]
description = "Shortest-path multi-hop baseline"
*.controller.routingMode = "spmh"
*.controller.cloudMode = false

[Config LEACH]
description = "Simplified LEACH baseline with rotating cluster heads"
*.controller.routingMode = "leach"
*.controller.cloudMode = false

[Config Paper3D]
description = "100-node 10x10x10 scenario from Table II"
extends = MARL
*.controller.areaWidth = 10
*.controller.areaHeight = 10
*.controller.areaDepth = 10
*.controller.communicationRange = 3.2

[Config TableI50Strict]
description = "Literal Table I values: 50 nodes, 100x100 area, coverage radius 9"
extends = MARL
*.numNodes = 50
*.controller.communicationRange = 9
*.controller.placementMode = "random"
